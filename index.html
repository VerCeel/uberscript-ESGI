<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap pour un minimum de style -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center mb-5">Gestion de Menu Restaurant</h1>

    <div id="globalError" class="alert alert-danger d-none" role="alert"></div>

    <div class="row">

        <!-- Création de repas -->
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <div class="card-body">

                    <h5 class="card-title">Créer un repas</h5>

                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input id="mealName" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Calories</label>
                        <input id="mealCalories" type="number" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Prix (€)</label>
                        <input id="mealPrice" type="number" class="form-control">
                    </div>

                    <button id="addMealBtn" class="btn btn-primary w-100">
                        Ajouter le repas
                    </button>

                </div>
            </div>
        </div>

        <!-- Liste des repas -->
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title mb-0">Liste des repas</h5>
                        <!-- Bonus: Filter by price -->
                        <div class="d-flex align-items-center">
                            <label for="priceFilter" class="form-label me-2 mb-0 small text-nowrap">Max Prix:</label>
                            <input id="priceFilter" type="number" class="form-control form-control-sm" placeholder="Ex: 10" style="width: 70px;">
                        </div>
                    </div>

                    <ul id="mealList" class="list-group">
                        <!-- rempli dynamiquement -->
                    </ul>

                </div>
            </div>
        </div>

        <!-- Portefeuille et Historique -->
        <div class="col-md-4 mb-4">
            <div class="row">
                <!-- Portefeuille -->
                <div class="col-12 mb-4">
                    <div class="card shadow banner bg-success text-white">
                        <div class="card-body">
                            <h5 class="card-title">Portefeuille Utilisateur</h5>
                            <p class="mb-1"><strong>Utilisateur :</strong> <span id="userName">...</span></p>
                            <h3 class="mb-0"><span id="userWallet">0</span> €</h3>
                            <div id="walletError" class="text-warning mt-2 small"></div>
                        </div>
                    </div>
                </div>

                <!-- Historique -->
                <div class="col-12">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="card-title d-flex justify-content-between align-items-center">
                                Historique
                                <span class="badge bg-primary rounded-pill">Total: <span id="totalSpent">0</span> €</span>
                            </h5>
                            <ul id="orderHistoryList" class="list-group mt-3" style="max-height: 250px; overflow-y: auto;">
                                <!-- rempli dynamiquement -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Script compilé depuis TypeScript -->
<script type="module" src="dist/app.js"></script>

</body>
</html>
